        return channels.filter(ch => {
          const matchCategory = ch.category === activeCategory;
          const matchCountry = activeCountry === "All" || ch.country === activeCountry;
          const matchSearch = !search || ch.name.toLowerCase().includes(search.toLowerCase()) || ch.desc.toLowerCase().includes(search.toLowerCase());
          const matchFav = !showFavoritesOnly || ch.favorite;
          return matchCategory && matchCountry && matchSearch && matchFav;
        }).sort((a, b) => (b.favorite - a.favorite) || a.name.localeCompare(b.name));
      }, [channels, activeCategory, activeCountry, search, showFavoritesOnly]);

      const toggleFav = (id) => {
        setChannels(prev => prev.map(ch => ch.id === id ? { ...ch, favorite: !ch.favorite } : ch));
      };

      const saveChannel = (form) => {
        if (editingChannel) {
          setChannels(prev => prev.map(ch => ch.id === editingChannel.id ? { ...form, id: ch.id } : ch));
        } else {
          setChannels(prev => [...prev, { ...form, id: "c" + Date.now() }]);
        }
        setModalOpen(false);
        setEditingChannel(null);
      };

      const deleteChannel = (id) => {
        if (confirm("Delete this channel?")) setChannels(prev => prev.filter(ch => ch.id !== id));
      };

      const openEdit = (ch) => { setEditingChannel(ch); setModalOpen(true); };
      const openAdd = () => { setEditingChannel(null); setModalOpen(true); };

      const countryCounts = useMemo(() => {
        const counts = {};
        channels.filter(ch => ch.category === activeCategory).forEach(ch => {
          counts[ch.country] = (counts[ch.country] || 0) + 1;
        });
        return counts;
      }, [channels, activeCategory]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-900 to-indigo-950">
          {/* Header */}
          <header className="sticky top-0 z-40 glass border-b border-white/5">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4">
              <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <Icons.TV />
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold tracking-tight text-white">Global<span className="gradient-text">TV</span> Bookmarks</h1>
                    <p className="text-xs text-slate-400">All your channels in one place</p>
                  </div>
                </div>
                
                <div className="flex items-center gap-3">
                  <div className="relative">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Icons.Search /></div>
                    <input 
                      className="w-full md:w-64 bg-slate-800/50 border border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition-all"
                      placeholder="Search channels..."
                      value={search}
                      onChange={e => setSearch(e.target.value)}
                    />
                  </div>
                  <button 
                    onClick={() => setShowFavoritesOnly(!showFavoritesOnly)}
                    className={`px-4 py-2.5 rounded-xl text-sm font-medium border transition-all ${showFavoritesOnly ? "bg-amber-500/20 border-amber-500/40 text-amber-400" : "bg-slate-800/50 border-slate-700 text-slate-400 hover:text-white"}`}
                  >
                    ⭐ Favorites
                  </button>
                  <button onClick={openAdd} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 transition-all shadow-lg shadow-indigo-600/20">
                    <Icons.Plus /> Add
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* Main Category Tabs */}
          <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-6">
            <div className="flex p-1 bg-slate-800/40 rounded-xl border border-white/5 backdrop-blur-sm mb-6">
              {MAIN_CATEGORIES.map(cat => (
                <button
                  key={cat}
                  onClick={() => { setActiveCategory(cat); setActiveCountry("All"); }}
                  className={`flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all ${activeCategory === cat ? "bg-indigo-600 text-white shadow-lg shadow-indigo-600/25" : "text-slate-400 hover:text-white hover:bg-white/5"}`}
                >
                  {cat === "SDA TV" ? "✝️ " : cat === "Premium TV" ? "💎 " : "📡 "}{cat}
                </button>
              ))}
            </div>

            {/* Country Filter */}
            <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2 mb-6">
              {COUNTRIES.map(country => (
                <button
                  key={country}
                  onClick={() => setActiveCountry(country)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap border transition-all ${activeCountry === country ? "bg-white/10 border-indigo-500/50 text-white shadow-lg shadow-indigo-500/10" : "bg-slate-800/30 border-white/5 text-slate-400 hover:bg-white/5 hover:text-white"}`}
                >
                  {country !== "All" && <span>{Flags[country]}</span>}
                  {country}
                  {country !== "All" && countryCounts[country] && (
                    <span className="bg-slate-700/50 text-slate-300 text-xs px-1.5 py-0.5 rounded-full">{countryCounts[country]}</span>
                  )}
                </button>
              ))}
            </div>

            {/* Results Count */}
            <div className="flex items-center justify-between mb-4">
              <p className="text-sm text-slate-400">
                Showing <span className="text-white font-medium">{filtered.length}</span> {activeCategory} channels
                {activeCountry !== "All" && <span> from <span className="text-white font-medium">{Flags[activeCountry]} {activeCountry}</span></span>}
              </p>
            </div>

            {/* Channel Grid */}
            {filtered.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-12">
                {filtered.map(channel => (
                  <ChannelCard 
                    key={channel.id} 
                    channel={channel} 
                    onToggleFav={toggleFav} 
                    onEdit={openEdit} 
                    onDelete={deleteChannel} 
                  />
                ))}
              </div>
            ) : (
              <div className="text-center py-20">
                <div className="w-16 h-16 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-600">
                  <Icons.TV />
                </div>
                <h3 className="text-lg font-medium text-white mb-1">No channels found</h3>
                <p className="text-slate-400 text-sm">Try adjusting your filters or add a new channel.</p>
              </div>
            )}
          </div>

          {/* Footer */}
          <footer className="border-t border-white/5 py-8 text-center text-slate-500 text-sm">
            <p>Global TV Bookmarks — Built for Software Engineers who love global television 🌍📺</p>
          </footer>

          {/* Add/Edit Modal */}
          <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title={editingChannel ? "Edit Channel" : "Add New Channel"}>
            <ChannelForm 
              channel={editingChannel} 
              onSave={saveChannel} 
              onCancel={() => { setModalOpen(false); setEditingChannel(null); }} 
            />
          </Modal>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
